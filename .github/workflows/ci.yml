name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: velmo
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/velmo
      REDIS_URL: redis://localhost:6379/0
      AZURE_OPENAI_API_KEY: ci-dummy-key
      AZURE_OPENAI_ENDPOINT: https://ci-dummy.openai.azure.com/openai/v1
      AZURE_OPENAI_DEPLOYMENT_NAME: ci-dummy
      AZURE_OPENAI_API_VERSION: "2025-08-07"
      LANGSMITH_TRACING: "false"
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Initialize database schema (Postgres de CI vierge)
        run: uv run python -c "from velmo.memory import get_db; get_db().init_db()"
      - name: Lint
        run: uv run ruff check .
      - name: Tests
        run: uv run pytest tests/ -v --tb=short
